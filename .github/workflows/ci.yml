name: CI

on:
  push:
  pull_request:

env:
  CONDUCTOR_CORE_SPEC: "conductor-core @ git+https://github.com/laceyp99/conductor-core.git@0132ee6fd1de1879713fd356fb507b7e937bf66c"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned Core dependency
        run: python -m pip install "$CONDUCTOR_CORE_SPEC"
      - name: Install package
        run: python -m pip install --upgrade pip build && python -m pip install -e ".[dev]"
      - name: Ruff format
        run: python -m ruff format --check .
      - name: Ruff lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest -q
      - name: Build
        run: python -m build

  windows-security:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Verify Gradio path traversal protection
        run: python -m pytest -q tests/test_security.py
